<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />

  <title>TedxIITRAM</title>
</head>

<body>
  <!-- illustration-------------------------------------------------------------------------------- -->

  <img class="img-fluid w-75 illustration-left-homepage"
    src="Resources/Images/Hero-Section/illustration-left-homepage.svg" alt="" srcset="">


  <!-- Right illustration -->
  <img class="img-fluid w-75 nav-right-illustration" src="Resources/Images/Hero-Section/navbar-right-illustration.svg"
    alt="" srcset="">



  <nav class="navbar navbar-expand-lg py-4 navbar-custom navbar-dark">
    <div class="container">
      <!-- Navbar Logo -->
      <a class="navbar-brand" href="#homepage">
        <img class="w-75" src="Resources/Images/Navbar/navbarlogo.svg" alt="" srcset="" />
      </a>
      <!-- Hamburger Menu -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav ms-auto px-3">
          <li class="nav-item px-3">
            <a class="nav-link hover-underline-animation" href="#speakers">Speakers</a>
          </li>
          <li class="nav-item px-3">
            <a class="nav-link hover-underline-animation" href="#discover">Discover</a>
          </li>
        </ul>
        <form class="py-2">
          <button class="btn btn-outline-danger btn-custom">
            Participate Now >
          </button>
        </form>


      </div>
    </div>

    <!-- Ellipse
        <img class="image-fluid w-50 nav-right-illustration-ellipse" src="Resources/Images/Hero-Section/navbar-illustration-right-Ellipse 1.svg" alt=""> -->
  </nav>

  <!-- Hero-Section -->

  <section class="homepage" id="homepage">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 my-5 py-5 py-1">
          <div>
            <img class="img-fluid w-100" src="Resources/Images/Hero-Section/hero-image-text.svg" alt="" />

          </div>

          <div class="box-date row ms-4 me-4 dropdown">
            <p class="col-6 m-auto ps-5

              ">26th March 2022</p>

            <button class="col-6 btn btn-outline-danger btn-custom btn-home dropdown-toggle" type="button"
              id="dropdownMenuButton1" data-bs-toggle="dropdown" aria-expanded="false">
              Participate Now
            </button>
            <ul class="dropdown-menu " aria-labelledby="dropdownMenuButton1">
              <li><a class="dropdown-item " href="#">as Attendee</a></li>
              <li><a class="dropdown-item " href="#">As Sponsor</a></li>

            </ul>





          </div>

        </div>

        <div class="col-md-6  ">

          <img class="img-fluid w-100 Hero-page-img justify-content-center"
            src="Resources/Images/Hero-Section/Hero-page-img.png" alt="">

        </div>
      </div>

    </div>

  </section>









  <!-- Scroll arrow -->

  <a href="#speakers">
    <div class="arrow  container sticky ">

      <span></span>
      <span></span>
      <!-- <span></span> -->
    </div>
  </a>








  <!-- Speakers section -->

  <section id="speakers" class="my-5">
    <div class="container">
      <div>
        <img class="py-5 image-fluid" src="Resources/Images/Speakers/introducing our speakers.svg" alt="" srcset="" />
      </div>

      <div class="speakers-list">
        <img class="w-50 image-fluid" src="Resources/Images/Speakers/speakers-list.png" alt="" />
      </div>
    </div>
  </section>

  <!-- Discover -->

  <section class="" id="discover">
    <img class="w-50 image-fluid" src="/Resources/Images/Discover/Illustration.svg" alt="" srcset="" />
  </section>

  <!-- Bootstrap Bundle with Popper -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"

  <!-- Custom JS -->
  <script src="index.js"></script>

</html>
